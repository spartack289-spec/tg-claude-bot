<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI Агенты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Agents screen ── */
    #agents-screen { padding: 16px; }

    .screen-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--tg-theme-text-color, #000);
    }

    #agents-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .agent-card {
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      border-radius: 14px;
      padding: 16px 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .agent-card:active { opacity: 0.6; transform: scale(0.97); }

    .agent-emoji { font-size: 34px; line-height: 1; }

    .agent-name {
      font-size: 14px;
      font-weight: 600;
      margin: 10px 0 4px;
      color: var(--tg-theme-text-color, #000);
    }

    .agent-desc {
      font-size: 12px;
      line-height: 1.4;
      color: var(--tg-theme-hint-color, #999);
    }

    /* ── Chat screen ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    #chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    #back-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--tg-theme-link-color, #2481cc);
      padding: 0 4px;
      line-height: 1;
    }

    #agent-title {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    #clear-btn {
      background: none;
      border: none;
      font-size: 12px;
      cursor: pointer;
      color: var(--tg-theme-hint-color, #999);
      padding: 4px 8px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message { display: flex; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      color: var(--tg-theme-text-color, #000);
      border-bottom-left-radius: 4px;
    }

    .typing-bubble {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 12px 16px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--tg-theme-hint-color, #999);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      background: var(--tg-theme-bg-color, #fff);
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    #msg-input {
      flex: 1;
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      color: var(--tg-theme-text-color, #000);
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }

    #msg-input::placeholder { color: var(--tg-theme-hint-color, #999); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.4; cursor: default; }

    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 120px;
      color: var(--tg-theme-hint-color, #999);
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Agents list screen -->
  <div id="agents-screen">
    <p class="screen-title">AI Агенты</p>
    <div id="agents-grid">
      <div id="loading">Загрузка...</div>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen">
    <div id="chat-header">
      <button id="back-btn" aria-label="Назад">‹</button>
      <span id="agent-title"></span>
      <button id="clear-btn">Очистить</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="Сообщение..."></textarea>
      <button id="send-btn" aria-label="Отправить">➤</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const BASE_URL = window.location.origin;
    let currentAgent = null;
    // client-side mirror of history for display
    const chatHistories = {};

    // ── Load agents ──────────────────────────────────────────────
    async function loadAgents() {
      try {
        const res = await fetch(`${BASE_URL}/api/agents`);
        if (!res.ok) throw new Error('Ошибка загрузки');
        const agents = await res.json();
        const grid = document.getElementById('agents-grid');
        grid.innerHTML = '';
        agents.forEach(agent => {
          const card = document.createElement('div');
          card.className = 'agent-card';
          card.innerHTML = `
            <div class="agent-emoji">${agent.emoji}</div>
            <div class="agent-name">${escHtml(agent.name)}</div>
            <div class="agent-desc">${escHtml(agent.description)}</div>
          `;
          card.addEventListener('click', () => openChat(agent));
          grid.appendChild(card);
        });
      } catch (e) {
        document.getElementById('agents-grid').innerHTML =
          `<div id="loading">Ошибка: ${escHtml(e.message)}</div>`;
      }
    }

    // ── Navigation ───────────────────────────────────────────────
    function openChat(agent) {
      currentAgent = agent;
      document.getElementById('agents-screen').style.display = 'none';
      const chatScreen = document.getElementById('chat-screen');
      chatScreen.style.display = 'flex';
      document.getElementById('agent-title').textContent = `${agent.emoji} ${agent.name}`;
      renderMessages(agent.id);
      tg.BackButton.show();
      tg.BackButton.onClick(closeChat);
      document.getElementById('msg-input').focus();
    }

    function closeChat() {
      document.getElementById('chat-screen').style.display = 'none';
      document.getElementById('agents-screen').style.display = 'block';
      tg.BackButton.hide();
      tg.BackButton.offClick(closeChat);
      currentAgent = null;
    }

    // ── Send message ─────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !currentAgent) return;

      const agentId = currentAgent.id;
      input.value = '';
      autoResize(input);

      if (!chatHistories[agentId]) chatHistories[agentId] = [];
      chatHistories[agentId].push({ role: 'user', content: text });
      renderMessages(agentId);

      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(`${BASE_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            agent_id: agentId,
            message: text,
            telegram_init_data: tg.initData,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка сервера');
        chatHistories[agentId].push({ role: 'assistant', content: data.reply });
      } catch (err) {
        chatHistories[agentId].push({ role: 'assistant', content: `⚠️ ${err.message}` });
      } finally {
        sendBtn.disabled = false;
        renderMessages(agentId);
      }
    }

    // ── Render ───────────────────────────────────────────────────
    function renderMessages(agentId) {
      const container = document.getElementById('messages');
      const msgs = chatHistories[agentId] || [];
      container.innerHTML = msgs.map(m => `
        <div class="message ${m.role}">
          <div class="bubble">${escHtml(m.content)}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'message assistant';
      el.id = 'typing-indicator';
      el.innerHTML = `<div class="bubble typing-bubble">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

    // ── Clear history ─────────────────────────────────────────────
    async function clearHistory() {
      if (!currentAgent) return;
      const agentId = currentAgent.id;
      chatHistories[agentId] = [];
      renderMessages(agentId);
      try {
        await fetch(`${BASE_URL}/api/chat/${agentId}/history`, {
          method: 'DELETE',
          headers: { 'X-Telegram-Init-Data': tg.initData },
        });
      } catch (_) {}
    }

    // ── Helpers ──────────────────────────────────────────────────
    function escHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Event listeners ──────────────────────────────────────────
    document.getElementById('send-btn').addEventListener('click', sendMessage);

    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById('msg-input').addEventListener('input', function () {
      autoResize(this);
    });

    document.getElementById('back-btn').addEventListener('click', closeChat);
    document.getElementById('clear-btn').addEventListener('click', clearHistory);

    // ── Init ─────────────────────────────────────────────────────
    loadAgents();
  </script>
</body>
</html>
