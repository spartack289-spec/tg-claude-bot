<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Офис</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #007AFF;
      --green:  #34C759;
      --red:    #FF3B30;
      --orange: #FF9500;
      --yellow: #FFD60A;
      --purple: #AF52DE;
      --teal:   #5AC8FA;
      --indigo: #5856D6;
      --pink:   #FF2D55;

      --bg:       #F2F2F7;
      --surface:  #FFFFFF;

      --label:  #000000;
      --label2: rgba(60,60,67,0.6);
      --label3: rgba(60,60,67,0.3);
      --label4: rgba(60,60,67,0.18);

      --fill:       rgba(120,120,128,0.20);
      --fill2:      rgba(120,120,128,0.16);
      --fill3:      rgba(120,120,128,0.12);
      --fill4:      rgba(120,120,128,0.08);

      --sep:        rgba(60,60,67,0.29);
      --nav-blur:   rgba(242,242,247,0.92);

      --shadow:     0 2px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-sm:  0 1px 4px rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ════════════════════════════════════
       AGENTS SCREEN
    ════════════════════════════════════ */
    #agents-screen { padding-bottom: 40px; }

    .app-header {
      padding: 20px 20px 10px;
      background: var(--nav-blur);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .app-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .app-subtitle {
      font-size: 15px;
      color: var(--label2);
      margin-top: 3px;
    }

    #agents-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 16px;
    }

    /* ── Agent card ── */
    .agent-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 16px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.14s ease, opacity 0.14s ease;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .agent-card:active { transform: scale(0.94); opacity: 0.75; }

    .agent-icon {
      width: 50px; height: 50px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }

    .agent-card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--label);
      letter-spacing: -0.2px;
    }

    .agent-card-desc {
      font-size: 12px;
      color: var(--label2);
      line-height: 1.4;
    }

    .agent-online {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--green);
      font-weight: 500;
    }

    .online-dot {
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    /* ── Loading ── */
    .loading-wrap {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
      color: var(--label2);
      font-size: 15px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--fill);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ════════════════════════════════════
       SHARED NAV BAR
    ════════════════════════════════════ */
    .nav-bar {
      background: var(--nav-blur);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 0.5px solid var(--sep);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 2px;
      color: var(--blue);
      font-size: 17px;
      font-weight: 400;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px 0;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .nav-back svg { margin-top: 1px; }

    .nav-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 0;
    }

    .nav-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-status {
      font-size: 11px;
      color: var(--green);
      font-weight: 500;
    }

    .nav-action {
      color: var(--blue);
      font-size: 15px;
      font-weight: 400;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px 0;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ════════════════════════════════════
       CHAT SCREEN
    ════════════════════════════════════ */
    #chat-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .message { display: flex; }
    .message.user      { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    /* Consecutive same-sender spacing */
    .message + .message.user      { margin-top: 2px; }
    .message + .message.assistant { margin-top: 2px; }
    .message.user + .message.assistant,
    .message.assistant + .message.user { margin-top: 8px; }

    .bubble {
      max-width: 82%;
      padding: 9px 13px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.45;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--blue);
      color: #fff;
      border-bottom-right-radius: 5px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      color: var(--label);
      border-bottom-left-radius: 5px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Markdown in bubbles ── */
    .bubble .md-h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin: 12px 0 4px;
    }
    .bubble .md-h2 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin: 10px 0 3px;
    }
    .bubble .md-h3 {
      font-size: 15px;
      font-weight: 600;
      margin: 8px 0 2px;
    }
    .bubble .md-h1:first-child,
    .bubble .md-h2:first-child,
    .bubble .md-h3:first-child { margin-top: 0; }

    .bubble .md-p { margin: 3px 0; }
    .bubble .md-p:first-child { margin-top: 0; }
    .bubble .md-p:last-child  { margin-bottom: 0; }

    .bubble .md-ul {
      padding-left: 16px;
      margin: 4px 0;
    }
    .bubble .md-li { margin: 2px 0; }

    .bubble .md-code {
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 13px;
      background: rgba(0,0,0,0.07);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .message.user .bubble .md-code {
      background: rgba(255,255,255,0.22);
    }

    /* Typing */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 5px 2px;
    }

    .tdot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--label3);
      animation: tdot 1.4s ease-in-out infinite;
    }
    .tdot:nth-child(2) { animation-delay: 0.18s; }
    .tdot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes tdot {
      0%, 60%, 100% { transform: scale(0.65); opacity: 0.25; }
      30%           { transform: scale(1);    opacity: 1; }
    }

    /* Input area */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 14px 10px;
      background: var(--nav-blur);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 0.5px solid var(--sep);
    }

    #msg-input {
      flex: 1;
      background: var(--surface);
      color: var(--label);
      border: 1px solid var(--sep);
      outline: none;
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    #msg-input:focus      { border-color: var(--blue); }
    #msg-input::placeholder { color: var(--label3); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    #send-btn:disabled { opacity: 0.3; cursor: default; }
    #send-btn:active   { transform: scale(0.88); }

    /* ════════════════════════════════════
       NEWS SCREEN
    ════════════════════════════════════ */
    #news-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
    }

    #news-feed {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 32px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Digest card */
    .digest-card {
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .digest-header {
      padding: 16px 16px 12px;
      border-bottom: 0.5px solid var(--sep);
    }

    .digest-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(0,122,255,0.10);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px;
    }

    .digest-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--label);
      line-height: 1.25;
    }

    .digest-time {
      font-size: 13px;
      color: var(--label2);
      margin-top: 4px;
    }

    .digest-body {
      padding: 14px 16px 0;
    }

    /* Markdown in digest */
    .digest-content { font-size: 15px; line-height: 1.65; color: var(--label); }
    .digest-content .md-h2 {
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.2px;
      margin: 14px 0 5px;
      color: var(--label);
    }
    .digest-content .md-h2:first-child { margin-top: 0; }
    .digest-content .md-h3 {
      font-size: 14px; font-weight: 600;
      margin: 10px 0 4px;
    }
    .digest-content .md-p { margin: 4px 0; }
    .digest-content .md-ul { padding-left: 18px; margin: 5px 0; }
    .digest-content .md-li { margin: 3px 0; }

    /* Truncate/expand */
    .digest-content.truncated {
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .digest-expand-btn {
      display: block;
      width: 100%;
      padding: 11px 16px;
      background: none;
      border: none;
      border-top: 0.5px solid var(--sep);
      color: var(--blue);
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      font-family: inherit;
      margin-top: 12px;
      -webkit-tap-highlight-color: transparent;
    }

    /* Sources */
    .digest-sources {
      padding: 0 16px 4px;
      border-top: 0.5px solid var(--sep);
      margin-top: 14px;
    }

    .digest-sources-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--label3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: 10px 0 6px;
    }

    .digest-src-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 0.5px solid var(--sep);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .digest-src-link:last-child { border-bottom: none; }

    .digest-src-favicon {
      width: 30px; height: 30px;
      background: var(--fill4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .digest-src-title {
      flex: 1;
      font-size: 14px;
      color: var(--label);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .digest-src-chevron {
      color: var(--label4);
      flex-shrink: 0;
    }

    /* "Want more news?" prompt */
    .digest-more-prompt {
      margin: 14px 16px 16px;
      background: rgba(0,122,255,0.07);
      border-radius: 14px;
      padding: 14px;
    }

    .digest-more-q {
      font-size: 15px;
      font-weight: 500;
      color: var(--label);
      margin-bottom: 10px;
    }

    .digest-more-actions {
      display: flex;
      gap: 8px;
    }

    .btn-yes {
      flex: 1;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn-no {
      flex: 1;
      background: var(--fill3);
      color: var(--label);
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-yes:disabled { opacity: 0.4; cursor: default; }
    .btn-yes:active   { opacity: 0.7; }
    .btn-no:active    { opacity: 0.5; }

    /* Empty state */
    .news-empty {
      text-align: center;
      padding: 52px 24px;
      color: var(--label2);
      font-size: 15px;
      line-height: 1.7;
    }

    .news-empty-icon { font-size: 56px; margin-bottom: 14px; }
    .news-empty-title { font-size: 20px; font-weight: 700; color: var(--label); margin-bottom: 6px; }

    .btn-primary {
      display: inline-block;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 13px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-primary:active   { opacity: 0.7; }

    /* Scrollbar hidden */
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* ── Desktop ── */
    @media (min-width: 600px) {
      #agents-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 20px; }
      .app-title   { font-size: 34px; }
      #messages    { padding: 16px 20px; }
      .bubble      { font-size: 15px; max-width: 72%; }
      #input-area  { padding: 10px 20px 12px; }
      #news-feed   { padding: 18px 20px 40px; }

      #chat-screen, #news-screen {
        max-width: 780px;
        margin: 0 auto;
        border-left:  0.5px solid var(--sep);
        border-right: 0.5px solid var(--sep);
      }
    }

    @media (min-width: 900px) {
      #agents-grid  { grid-template-columns: repeat(4, 1fr); }
      #agents-screen { max-width: 1200px; margin: 0 auto; }
    }
  </style>
</head>
<body>

  <!-- ══ Agents ══ -->
  <div id="agents-screen">
    <div class="app-header">
      <div class="app-title">AI Офис</div>
      <div class="app-subtitle">Выберите агента</div>
    </div>
    <div id="agents-grid">
      <div class="loading-wrap">
        <div class="spinner"></div>
        <span>Загрузка агентов…</span>
      </div>
    </div>
  </div>

  <!-- ══ Chat ══ -->
  <div id="chat-screen">
    <div class="nav-bar">
      <button class="nav-back" id="chat-back-btn">
        <svg width="11" height="18" viewBox="0 0 11 18" fill="none">
          <path d="M9.5 1.5L2 9l7.5 7.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Назад
      </button>
      <div class="nav-center">
        <div class="nav-title" id="agent-title"></div>
        <div class="nav-status">● онлайн</div>
      </div>
      <button class="nav-action" id="clear-btn">Очистить</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="Сообщение…"></textarea>
      <button id="send-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ══ News ══ -->
  <div id="news-screen">
    <div class="nav-bar">
      <button class="nav-back" id="news-back-btn">
        <svg width="11" height="18" viewBox="0 0 11 18" fill="none">
          <path d="M9.5 1.5L2 9l7.5 7.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Назад
      </button>
      <div class="nav-center">
        <div class="nav-title" id="news-title"></div>
        <div class="nav-status">обновляется 3×/день</div>
      </div>
      <button class="nav-action" id="news-refresh-btn">Обновить</button>
    </div>
    <div id="news-feed"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const BASE = window.location.origin;
    let currentAgent = null;
    const chatHistories = {};

    /* ── Agent visual config ── */
    const AGENT_STYLE = {
      startup:    { bg: 'rgba(255,149,0,0.13)',   color: '#FF9500',  emoji: '🚀' },
      news:       { bg: 'rgba(0,122,255,0.10)',   color: '#007AFF',  emoji: '📰' },
      code:       { bg: 'rgba(52,199,89,0.12)',   color: '#34C759',  emoji: '💻' },
      copywriter: { bg: 'rgba(255,45,85,0.10)',   color: '#FF2D55',  emoji: '✍️' },
      analyst:    { bg: 'rgba(255,214,10,0.18)',  color: '#C89500',  emoji: '📊' },
      translator: { bg: 'rgba(90,200,250,0.15)',  color: '#0099CC',  emoji: '🌐' },
      creative:   { bg: 'rgba(175,82,222,0.10)',  color: '#AF52DE',  emoji: '🎨' },
      general:    { bg: 'rgba(88,86,214,0.10)',   color: '#5856D6',  emoji: '🤖' },
    };

    function agentStyle(id) {
      return AGENT_STYLE[id] || { bg: 'rgba(88,86,214,0.10)', color: '#5856D6', emoji: '🤖' };
    }

    /* ── Markdown renderer ── */
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function applyInline(s) {
      return s
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
        .replace(/\*([^*\n]+?)\*/g,    '<em>$1</em>')
        .replace(/`([^`]+)`/g,         '<code class="md-code">$1</code>');
    }

    function renderMarkdown(raw) {
      const lines = esc(String(raw)).split('\n');
      let html = '';
      let inList = false;

      for (const line of lines) {
        if (/^### /.test(line)) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<div class="md-h3">${applyInline(line.slice(4))}</div>`;
        } else if (/^## /.test(line)) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<div class="md-h2">${applyInline(line.slice(3))}</div>`;
        } else if (/^# /.test(line)) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<div class="md-h1">${applyInline(line.slice(2))}</div>`;
        } else if (/^[-•*] /.test(line)) {
          if (!inList) { html += '<ul class="md-ul">'; inList = true; }
          html += `<li class="md-li">${applyInline(line.slice(2))}</li>`;
        } else if (line.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<p class="md-p">${applyInline(line)}</p>`;
        }
      }

      if (inList) html += '</ul>';
      return html;
    }

    /* ── Load agents ── */
    async function loadAgents() {
      try {
        const res = await fetch(`${BASE}/api/agents`);
        if (!res.ok) throw new Error('Ошибка загрузки');
        const agents = await res.json();
        const grid = document.getElementById('agents-grid');
        grid.innerHTML = '';

        if (!agents.length) {
          grid.innerHTML = `<div class="loading-wrap"><span style="font-size:36px">🏗️</span><span>Агенты скоро появятся</span></div>`;
          return;
        }

        agents.forEach(agent => {
          const st = agentStyle(agent.id);
          const card = document.createElement('div');
          card.className = 'agent-card';
          card.innerHTML = `
            <div class="agent-icon" style="background:${st.bg}">
              ${esc(agent.emoji || st.emoji)}
            </div>
            <div class="agent-card-name">${esc(agent.name)}</div>
            <div class="agent-card-desc">${esc(agent.description)}</div>
            <div class="agent-online"><span class="online-dot"></span> онлайн</div>
          `;
          card.addEventListener('click', () => {
            if (agent.type === 'news') openNews(agent);
            else openChat(agent);
          });
          grid.appendChild(card);
        });
      } catch (e) {
        document.getElementById('agents-grid').innerHTML =
          `<div class="loading-wrap">⚠️ ${esc(e.message)}</div>`;
      }
    }

    /* ════════════════════════════════════
       CHAT
    ════════════════════════════════════ */
    function openChat(agent) {
      currentAgent = agent;
      document.getElementById('agents-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('agent-title').textContent = agent.name;
      renderMessages(agent.id);
      tg.BackButton.show();
      tg.BackButton.onClick(closeChat);
      document.getElementById('msg-input').focus();
    }

    function closeChat() {
      document.getElementById('chat-screen').style.display = 'none';
      document.getElementById('agents-screen').style.display = 'block';
      tg.BackButton.hide();
      tg.BackButton.offClick(closeChat);
      currentAgent = null;
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !currentAgent) return;

      const agentId = currentAgent.id;
      input.value = '';
      autoResize(input);

      if (!chatHistories[agentId]) chatHistories[agentId] = [];
      chatHistories[agentId].push({ role: 'user', content: text });
      renderMessages(agentId);

      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(`${BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent_id: agentId, message: text, telegram_init_data: tg.initData }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка сервера');
        chatHistories[agentId].push({ role: 'assistant', content: data.reply });
      } catch (err) {
        chatHistories[agentId].push({ role: 'assistant', content: `⚠️ ${err.message}` });
      } finally {
        sendBtn.disabled = false;
        renderMessages(agentId);
      }
    }

    function renderMessages(agentId) {
      const container = document.getElementById('messages');
      const msgs = chatHistories[agentId] || [];

      // Remove typing indicator
      document.getElementById('typing-indicator')?.remove();

      container.innerHTML = msgs.map(m => {
        if (m.role === 'user') {
          return `<div class="message user"><div class="bubble">${esc(m.content)}</div></div>`;
        } else {
          return `<div class="message assistant"><div class="bubble">${renderMarkdown(m.content)}</div></div>`;
        }
      }).join('');

      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'message assistant';
      el.id = 'typing-indicator';
      el.innerHTML = `<div class="bubble"><div class="typing-dots"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div></div>`;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

    async function clearHistory() {
      if (!currentAgent) return;
      chatHistories[currentAgent.id] = [];
      renderMessages(currentAgent.id);
      try {
        await fetch(`${BASE}/api/chat/${currentAgent.id}/history`, {
          method: 'DELETE',
          headers: { 'X-Telegram-Init-Data': tg.initData },
        });
      } catch (_) {}
    }

    /* ════════════════════════════════════
       NEWS
    ════════════════════════════════════ */
    function openNews(agent) {
      currentAgent = agent;
      document.getElementById('agents-screen').style.display = 'none';
      document.getElementById('news-screen').style.display = 'flex';
      document.getElementById('news-title').textContent = agent.name;
      loadNews();
      tg.BackButton.show();
      tg.BackButton.onClick(closeNews);
    }

    function closeNews() {
      document.getElementById('news-screen').style.display = 'none';
      document.getElementById('agents-screen').style.display = 'block';
      tg.BackButton.hide();
      tg.BackButton.offClick(closeNews);
      currentAgent = null;
    }

    async function loadNews() {
      const feed = document.getElementById('news-feed');
      feed.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span>Загрузка дайджестов…</span></div>`;
      try {
        const res = await fetch(`${BASE}/api/news`);
        const digests = await res.json();
        renderDigests(digests);
      } catch (e) {
        feed.innerHTML = `<div class="news-empty"><div class="news-empty-icon">⚠️</div><div class="news-empty-title">Ошибка загрузки</div>${esc(e.message)}</div>`;
      }
    }

    function renderDigests(digests) {
      const feed = document.getElementById('news-feed');

      if (!digests || !digests.length) {
        feed.innerHTML = `
          <div class="news-empty">
            <div class="news-empty-icon">📭</div>
            <div class="news-empty-title">Дайджестов пока нет</div>
            Первый выйдет в 8:00, 14:00 или 20:00 МСК.
            <br>
            <button class="btn-primary" id="manual-refresh-btn">⚡ Собрать сейчас</button>
          </div>`;
        document.getElementById('manual-refresh-btn')?.addEventListener('click', triggerRefresh);
        return;
      }

      feed.innerHTML = digests.map((d, i) => buildDigestCard(d, i)).join('');

      // "Want more?" only on the newest digest (index 0)
      const firstPrompt = feed.querySelector('.digest-more-prompt');
      if (firstPrompt) {
        firstPrompt.querySelector('.btn-yes')?.addEventListener('click', triggerRefresh);
        firstPrompt.querySelector('.btn-no')?.addEventListener('click', function() {
          firstPrompt.style.display = 'none';
        });
      }

      // Expand buttons
      feed.querySelectorAll('.digest-expand-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const content = this.closest('.digest-card').querySelector('.digest-content');
          const isExpanded = !content.classList.contains('truncated');
          if (isExpanded) {
            content.classList.add('truncated');
            this.textContent = 'Читать полностью';
          } else {
            content.classList.remove('truncated');
            this.textContent = 'Свернуть';
          }
        });
      });
    }

    function buildDigestCard(d, i) {
      const isFirst = i === 0;
      const sourcesHtml = (d.links && d.links.length)
        ? `<div class="digest-sources">
            <div class="digest-sources-label">Источники</div>
            ${d.links.map(l => `
              <a class="digest-src-link" href="${esc(l.url)}" target="_blank">
                <div class="digest-src-favicon">🔗</div>
                <div class="digest-src-title">${esc(l.title)}</div>
                <svg class="digest-src-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
                  <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>`).join('')}
          </div>`
        : '';

      const morePromptHtml = isFirst
        ? `<div class="digest-more-prompt">
            <div class="digest-more-q">🔄 Хотите ещё свежих новостей?</div>
            <div class="digest-more-actions">
              <button class="btn-yes">Да, собрать!</button>
              <button class="btn-no">Нет, спасибо</button>
            </div>
          </div>`
        : '';

      return `
        <div class="digest-card">
          <div class="digest-header">
            <div class="digest-badge">📰 AI Дайджест</div>
            <div class="digest-title">${esc(d.title)}</div>
            <div class="digest-time">${formatDate(d.created_at)}</div>
          </div>
          <div class="digest-body">
            <div class="digest-content truncated">${renderMarkdown(d.content)}</div>
          </div>
          <button class="digest-expand-btn">Читать полностью</button>
          ${sourcesHtml}
          ${morePromptHtml}
        </div>`;
    }

    async function triggerRefresh() {
      const headerBtn  = document.getElementById('news-refresh-btn');
      const feed = document.getElementById('news-feed');

      if (headerBtn) { headerBtn.disabled = true; headerBtn.textContent = '…'; }

      feed.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span>Собираю новости… ~30 сек</span></div>`;

      try {
        const res = await fetch(`${BASE}/api/news/refresh`, {
          method: 'POST',
          headers: { 'X-Telegram-Init-Data': tg.initData },
        });
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('application/json')) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
        renderDigests(data.digests || []);
      } catch (e) {
        feed.innerHTML = `
          <div class="news-empty">
            <div class="news-empty-icon">⚠️</div>
            <div class="news-empty-title">Ошибка сбора</div>
            ${esc(e.message)}<br>
            <button class="btn-primary" onclick="triggerRefresh()">Попробовать снова</button>
          </div>`;
      } finally {
        if (headerBtn) { headerBtn.disabled = false; headerBtn.textContent = 'Обновить'; }
      }
    }

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleString('ru-RU', {
          day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit'
        });
      } catch { return iso; }
    }

    /* ── Helpers ── */
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    /* ── Event listeners ── */
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msg-input').addEventListener('input', function() { autoResize(this); });
    document.getElementById('chat-back-btn').addEventListener('click', closeChat);
    document.getElementById('news-back-btn').addEventListener('click', closeNews);
    document.getElementById('clear-btn').addEventListener('click', clearHistory);
    document.getElementById('news-refresh-btn').addEventListener('click', triggerRefresh);

    loadAgents();
  </script>
</body>
</html>
