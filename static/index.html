<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Офис</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    /* ══ Apple Design Tokens ══ */
    :root {
      --app-bg:       #1c1c1e;
      --secondary-bg: #2c2c2e;
      --tertiary-bg:  #3a3a3c;
      --label:        #ffffff;
      --label2:       rgba(235,235,245,0.6);
      --label3:       rgba(235,235,245,0.3);
      --fill3:        rgba(118,118,128,0.24);
      --sep:          rgba(84,84,88,0.65);
      --blue:         #007AFF;
      --green:        #30D158;
      --red:          #FF453A;
      --tl-red:       #FF5F57;
      --tl-yellow:    #FFBD2E;
      --tl-green:     #28C840;
      --toolbar-bg:   rgba(28,28,30,0.88);
      --toolbar-border: rgba(84,84,88,0.65);
      --sidebar-bg:   rgba(30,30,32,0.97);
      --iso-desk-top:      #2d2d3a;
      --iso-desk-front:    #222230;
      --iso-desk-side:     #28283a;
      --iso-cabinet-top:   #2a2a38;
      --iso-cabinet-front: #1f1f2e;
      --iso-cabinet-side:  #252535;
      --iso-monitor-bg:    #0a0a14;
      --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
      --ease-out:    cubic-bezier(0.16,1,0.3,1);
      --hint: rgba(235,235,245,0.45);
    }

    [data-theme="light"] {
      --app-bg:       #f2f2f7;
      --secondary-bg: #ffffff;
      --tertiary-bg:  #efeff4;
      --label:        #000000;
      --label2:       rgba(60,60,67,0.6);
      --label3:       rgba(60,60,67,0.3);
      --fill3:        rgba(120,120,128,0.16);
      --sep:          rgba(60,60,67,0.29);
      --toolbar-bg:   rgba(246,246,248,0.88);
      --toolbar-border: rgba(60,60,67,0.2);
      --sidebar-bg:   rgba(242,242,247,0.97);
      --iso-desk-top:      #b8bcc8;
      --iso-desk-front:    #a8acbc;
      --iso-desk-side:     #b0b4c4;
      --iso-cabinet-top:   #c8ccda;
      --iso-cabinet-front: #b8bcc8;
      --iso-cabinet-side:  #c0c4d0;
      --hint: rgba(60,60,67,0.5);
    }

    body {
      background: var(--app-bg);
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100dvh;
    }

    /* ══ Transition overlay ══ */
    #transition-overlay {
      position: fixed; z-index: 500; pointer-events: none;
      background: var(--secondary-bg); border-radius: 18px;
      opacity: 0; will-change: transform, opacity;
      transform-origin: top left;
    }
    #transition-overlay.expanding {
      animation: tOverlayExpand 400ms var(--ease-out) forwards;
    }
    #transition-overlay.collapsing {
      animation: tOverlayCollapse 300ms var(--ease-out) forwards;
    }
    @keyframes tOverlayExpand {
      from { opacity: 1; transform: scale(1); border-radius: 18px; }
      to   { opacity: 1; transform: scale(var(--sx,1), var(--sy,1)); border-radius: 0; }
    }
    @keyframes tOverlayCollapse {
      from { opacity: 1; transform: scale(var(--sx,1), var(--sy,1)); border-radius: 0; }
      to   { opacity: 0; transform: scale(1); border-radius: 18px; }
    }

    /* ══ App Window ══ */
    #app-window {
      display: flex; flex-direction: column;
      height: 100dvh; overflow: hidden;
    }

    /* ══ Toolbar ══ */
    #window-toolbar {
      height: 44px;
      background: var(--toolbar-bg);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border-bottom: 0.5px solid var(--toolbar-border);
      display: flex; align-items: center; padding: 0 14px; gap: 10px;
      flex-shrink: 0; z-index: 100;
    }
    @supports not (backdrop-filter: blur(1px)) {
      #window-toolbar { background: var(--secondary-bg); }
    }
    .tl-group { display: flex; align-items: center; gap: 6px; }
    .tl-dot {
      width: 12px; height: 12px; border-radius: 50%;
      box-shadow: 0 0 0 0.5px rgba(0,0,0,0.25);
      transition: filter 0.1s;
    }
    .tl-red    { background: var(--tl-red); }
    .tl-yellow { background: var(--tl-yellow); }
    .tl-green  { background: var(--tl-green); }
    .tl-dot.clickable { cursor: pointer; }
    .tl-dot.clickable:active { filter: brightness(0.7); }
    #toolbar-title {
      flex: 1; text-align: center;
      font-size: 13px; font-weight: 600; color: var(--label);
      letter-spacing: -0.1px;
    }
    #toolbar-action {
      font-size: 14px; color: var(--blue); background: none; border: none;
      cursor: pointer; font-family: inherit; padding: 6px 0;
      min-width: 48px; text-align: right;
      -webkit-tap-highlight-color: transparent;
    }

    /* ══ Window Body ══ */
    #window-body {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ══ Sidebar (desktop) ══ */
    #window-sidebar {
      display: none;
      width: 200px; flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 0.5px solid var(--sep);
      padding: 12px 0;
      overflow-y: auto;
    }
    @media (min-width: 600px) {
      #window-sidebar { display: flex; flex-direction: column; gap: 2px; }
    }
    .sidebar-section-label {
      font-size: 11px; font-weight: 600; color: var(--label3);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 8px 16px 4px;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; border-radius: 8px; margin: 0 6px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--label2); transition: background 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .sidebar-item.active { background: var(--fill3); color: var(--label); }
    .sidebar-item:active  { background: var(--fill3); }
    .sidebar-icon { font-size: 15px; width: 20px; text-align: center; }

    /* ══ Window Content ══ */
    #window-content {
      flex: 1; overflow: hidden; position: relative;
    }

    /* ══ Screen base ══ */
    #agents-screen, #chat-screen, #news-screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #agents-screen  { display: flex; }
    #chat-screen    { display: none; }
    #news-screen    { display: none; }

    /* ══ Finder Path Bar ══ */
    .finder-path-bar {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 14px; font-size: 12px; color: var(--label2);
      background: var(--secondary-bg);
      border-bottom: 0.5px solid var(--sep);
      flex-shrink: 0;
    }
    .path-root { cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .path-root:active { color: var(--blue); }
    .path-sep  { color: var(--label3); font-size: 11px; }
    .path-current { color: var(--label); font-weight: 500; }

    /* ══ Agents screen ══ */
    #agents-screen {
      background: var(--app-bg);
    }

    /* Filter pills (mobile) */
    .filter-pills {
      display: flex; gap: 7px; padding: 10px 14px 8px;
      overflow-x: auto; flex-shrink: 0;
      scrollbar-width: none;
    }
    .filter-pills::-webkit-scrollbar { display: none; }
    @media (min-width: 600px) { .filter-pills { display: none; } }

    .pill {
      white-space: nowrap; padding: 5px 13px;
      border-radius: 100px; font-size: 13px; font-weight: 500;
      background: var(--secondary-bg); color: var(--label2);
      border: 0.5px solid var(--sep); cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .pill.active {
      background: var(--blue); color: #fff; border-color: var(--blue);
    }

    /* Grid */
    #agents-grid {
      flex: 1;
      overflow-y: scroll; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px; padding: 6px 12px 24px;
      align-content: start;
    }
    @media (min-width: 600px) {
      #agents-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 10px 16px 24px; }
    }
    @media (min-width: 900px) {
      #agents-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* ══ Workstation card ══ */
    .workstation {
      border-radius: 18px;
      background: var(--secondary-bg);
      cursor: pointer;
      overflow: visible;
      position: relative;
      transition: transform 150ms var(--ease-spring);
      -webkit-tap-highlight-color: transparent;
    }
    .workstation::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 18px; pointer-events: none;
      box-shadow: inset 0 0 0 0.5px var(--sep);
    }
    .workstation:active { transform: scale(0.93); }

    /* Accent bar */
    .workstation::before {
      content: ''; position: absolute;
      top: 0; left: 16px; right: 16px; height: 2px;
      background: var(--accent-color, var(--blue));
      border-radius: 0 0 2px 2px; z-index: 1;
    }

    /* Iso stage wrapper */
    .ws-iso-wrap {
      display: flex; align-items: center; justify-content: center;
      padding: 20px 10px 6px;
      perspective: 500px;
    }

    /* The 3D scene */
    .ws-iso-stage {
      width: 96px; height: 96px;
      transform-style: preserve-3d;
      transform: rotateX(28deg) rotateY(-42deg);
      position: relative;
    }

    /* ── Desk ── */
    .iso-desk {
      position: absolute;
      bottom: 0; left: 0;
      width: 96px; height: 56px;
      transform-style: preserve-3d;
    }
    .iso-desk .f-top {
      position: absolute;
      width: 96px; height: 56px;
      background: var(--iso-desk-top);
      transform: rotateX(90deg) translateZ(6px);
      transform-origin: bottom center;
    }
    .iso-desk .f-front {
      position: absolute;
      width: 96px; height: 12px;
      background: var(--iso-desk-front);
      bottom: 0; transform: translateZ(6px);
    }
    .iso-desk .f-right {
      position: absolute;
      width: 56px; height: 12px;
      background: var(--iso-desk-side);
      bottom: 0; right: 0;
      transform: rotateY(90deg) translateZ(0px);
      transform-origin: right center;
    }

    /* ── Cabinet tower ── */
    .iso-cabinet {
      position: absolute;
      bottom: 12px; right: 6px;
      width: 22px; height: 42px;
      transform-style: preserve-3d;
    }
    .iso-cabinet .f-top {
      position: absolute;
      width: 22px; height: 22px;
      background: var(--iso-cabinet-top);
      transform: rotateX(90deg) translateZ(0px);
      transform-origin: bottom center;
    }
    .iso-cabinet .f-front {
      position: absolute;
      width: 22px; height: 42px;
      background: var(--iso-cabinet-front);
      bottom: 0; transform: translateZ(11px);
    }
    .iso-cabinet .f-right {
      position: absolute;
      width: 22px; height: 42px;
      background: var(--iso-cabinet-side);
      bottom: 0; right: 0;
      transform: rotateY(90deg) translateZ(0px);
      transform-origin: right center;
    }
    /* LED indicator */
    .iso-cabinet .led {
      position: absolute;
      bottom: 8px; left: 50%; transform: translateZ(12px) translateX(-50%);
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--accent-color, var(--blue));
      box-shadow: 0 0 4px 1px var(--accent-color, var(--blue));
      animation: ledPulse 2.4s ease-in-out infinite;
      z-index: 2;
    }
    @keyframes ledPulse {
      0%,100% { opacity: 0.5; } 50% { opacity: 1; }
    }

    /* ── Monitor ── */
    .iso-monitor {
      position: absolute;
      bottom: 18px; left: 8px;
      width: 52px; height: 38px;
      transform-style: preserve-3d;
    }
    .iso-monitor .f-front {
      position: absolute; inset: 0;
      background: var(--iso-monitor-bg);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      transform: translateZ(3px);
      overflow: hidden;
    }
    .iso-monitor .f-right {
      position: absolute;
      width: 6px; height: 38px;
      background: #111120;
      right: 0;
      transform: rotateY(90deg) translateZ(0px);
      transform-origin: right center;
    }
    .iso-monitor .f-top {
      position: absolute;
      width: 52px; height: 6px;
      background: #1a1a2a;
      top: 0;
      transform: rotateX(90deg) translateZ(0px);
      transform-origin: top center;
    }
    /* Monitor bezel dots */
    .mon-bar {
      position: absolute; top: 3px; left: 4px;
      display: flex; gap: 2.5px; z-index: 1;
    }
    .mon-dot {
      width: 3.5px; height: 3.5px; border-radius: 50%;
    }
    .mon-dot-r { background: #FF5F57; }
    .mon-dot-y { background: #FFBD2E; }
    .mon-dot-g { background: #28C840; }
    /* Scan lines on screen */
    .mon-screen {
      position: absolute; top: 10px; left: 3px; right: 3px; bottom: 4px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .mon-line {
      height: 2.5px; border-radius: 2px;
      background: var(--accent-color, var(--blue));
      animation: monScan 2.2s ease-in-out infinite;
    }
    .mon-line:nth-child(1) { width: 80%; }
    .mon-line:nth-child(2) { width: 60%; animation-delay: 0.3s; }
    .mon-line:nth-child(3) { width: 72%; animation-delay: 0.6s; }
    @keyframes monScan {
      0%,100% { opacity: 0.25; transform: scaleX(0.75); }
      50%      { opacity: 0.85; transform: scaleX(1); }
    }
    /* Cursor */
    .mon-cursor {
      width: 4px; height: 7px;
      background: var(--accent-color, var(--blue));
      border-radius: 1px;
      animation: blink 1s step-end infinite;
      margin-top: 2px; margin-left: 1px;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    /* Monitor stand */
    .iso-mon-stand {
      position: absolute;
      bottom: 10px; left: 22px;
      width: 8px; height: 8px;
      background: rgba(255,255,255,0.08);
      transform: translateZ(2px);
    }

    /* Card label */
    .ws-label {
      padding: 8px 12px 14px;
      text-align: center;
    }
    .ws-name {
      font-size: 13px; font-weight: 700; color: var(--label);
      letter-spacing: -0.2px;
    }
    .ws-desc {
      font-size: 11px; color: var(--hint);
      margin-top: 3px; line-height: 1.4;
    }
    .ws-online {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--green); font-weight: 500;
      margin-top: 5px;
    }
    .online-dot {
      width: 5px; height: 5px;
      background: var(--green); border-radius: 50%;
      animation: onlinePulse 2s ease-in-out infinite;
    }
    @keyframes onlinePulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(48,209,88,0.5); }
      50%      { box-shadow: 0 0 0 4px rgba(48,209,88,0); }
    }

    /* Loading */
    .loading-wrap {
      grid-column: 1/-1;
      display: flex; flex-direction: column;
      align-items: center; padding: 60px 20px; gap: 14px;
      color: var(--hint); font-size: 14px;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 2.5px solid var(--fill3);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ══ Chat screen ══ */
    #chat-screen { background: var(--app-bg); }

    #messages {
      flex: 1; overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      padding: 12px 14px; display: flex;
      flex-direction: column; gap: 2px;
      overscroll-behavior: contain;
    }

    .message { display: flex; }
    .message.user      { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .message.user + .message.assistant,
    .message.assistant + .message.user { margin-top: 8px; }

    .bubble {
      max-width: 82%; padding: 9px 13px;
      border-radius: 18px; font-size: 15px;
      line-height: 1.5; word-break: break-word;
    }
    .message.user .bubble {
      background: var(--blue); color: #fff;
      border-bottom-right-radius: 5px;
    }
    .message.assistant .bubble {
      background: var(--secondary-bg);
      border: 0.5px solid var(--sep);
      color: var(--label);
      border-bottom-left-radius: 5px;
    }

    /* Markdown */
    .bubble .md-h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin: 12px 0 4px; display: block; }
    .bubble .md-h2 { font-size: 15px; font-weight: 700; margin: 10px 0 3px; display: block; }
    .bubble .md-h3 { font-size: 14px; font-weight: 600; margin: 8px 0 2px; display: block; }
    .bubble .md-h1:first-child,
    .bubble .md-h2:first-child,
    .bubble .md-h3:first-child { margin-top: 0; }
    .bubble .md-p  { margin: 3px 0; display: block; }
    .bubble .md-p:first-child { margin-top: 0; }
    .bubble .md-p:last-child  { margin-bottom: 0; }
    .bubble .md-ul { padding-left: 16px; margin: 4px 0; }
    .bubble .md-li { margin: 2px 0; }
    .bubble .md-hr { border: none; border-top: 1px solid var(--sep); margin: 8px 0; }
    .bubble .md-code {
      font-family: 'SF Mono','Fira Code','Menlo',monospace;
      font-size: 12px; background: rgba(0,0,0,0.2);
      padding: 1px 5px; border-radius: 4px;
    }
    .message.user .bubble .md-code { background: rgba(255,255,255,0.2); }

    /* Typing dots */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 5px 2px; }
    .tdot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--hint); animation: tdot 1.4s ease-in-out infinite;
    }
    .tdot:nth-child(2) { animation-delay: 0.18s; }
    .tdot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes tdot { 0%,60%,100% { transform:scale(0.65); opacity:0.25; } 30% { transform:scale(1); opacity:1; } }

    /* Input area */
    #input-area {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 8px 14px 10px;
      background: var(--toolbar-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 0.5px solid var(--sep);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1; background: var(--tertiary-bg);
      color: var(--label); border: 0.5px solid var(--sep);
      outline: none; border-radius: 20px;
      padding: 9px 14px; font-size: 16px;
      font-family: inherit; resize: none; max-height: 120px;
      line-height: 1.4; transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--blue); }
    #msg-input::placeholder { color: var(--hint); }

    #send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--blue); color: #fff;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:disabled { opacity: 0.3; cursor: default; }
    #send-btn:active   { transform: scale(0.88); }

    /* ══ News screen ══ */
    #news-screen { background: var(--app-bg); }

    #news-feed {
      flex: 1; overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      padding: 14px 14px 40px;
      display: flex; flex-direction: column; gap: 14px;
      overscroll-behavior: contain;
    }

    .digest-card {
      background: var(--secondary-bg);
      border: 0.5px solid var(--sep);
      border-radius: 20px; overflow: hidden;
    }
    .digest-header {
      padding: 16px 16px 12px;
      border-bottom: 0.5px solid var(--sep);
    }
    .digest-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(0,122,255,0.12); border-radius: 6px;
      padding: 3px 8px; font-size: 11px; font-weight: 600;
      color: #5ac8fa; text-transform: uppercase;
      letter-spacing: 0.4px; margin-bottom: 8px;
    }
    .digest-title {
      font-size: 17px; font-weight: 700; letter-spacing: -0.3px;
      color: var(--label); line-height: 1.3;
    }
    .digest-time { font-size: 12px; color: var(--hint); margin-top: 4px; }
    .digest-body { padding: 14px 16px 0; }
    .digest-content { font-size: 14px; line-height: 1.65; color: var(--label2); }
    .digest-content .md-h2 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; margin: 14px 0 5px; color: var(--label); display: block; }
    .digest-content .md-h2:first-child { margin-top: 0; }
    .digest-content .md-h3 { font-size: 13px; font-weight: 600; margin: 8px 0 3px; display: block; }
    .digest-content .md-p  { margin: 4px 0; display: block; }
    .digest-content .md-ul { padding-left: 18px; margin: 5px 0; }
    .digest-content .md-li { margin: 3px 0; }
    .digest-content .md-hr { border: none; border-top: 1px solid var(--sep); margin: 10px 0; }
    .digest-content.truncated {
      display: -webkit-box; -webkit-line-clamp: 6;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .digest-expand-btn {
      display: block; width: 100%; padding: 11px;
      background: none; border: none;
      border-top: 0.5px solid var(--sep);
      color: var(--blue); font-size: 14px; font-weight: 500;
      text-align: center; cursor: pointer;
      font-family: inherit; margin-top: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .digest-sources { padding: 0 16px 4px; border-top: 0.5px solid var(--sep); margin-top: 12px; }
    .digest-sources-label {
      font-size: 11px; font-weight: 600; color: var(--hint);
      text-transform: uppercase; letter-spacing: 0.6px; padding: 10px 0 6px;
    }
    .digest-src-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 0.5px solid var(--sep);
      text-decoration: none; -webkit-tap-highlight-color: transparent;
    }
    .digest-src-link:last-child { border-bottom: none; }
    .digest-src-icon {
      width: 28px; height: 28px; background: var(--fill3);
      border-radius: 7px; display: flex; align-items: center;
      justify-content: center; font-size: 13px; flex-shrink: 0;
    }
    .digest-src-title {
      flex: 1; font-size: 13px; color: var(--label);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .digest-src-chevron { color: var(--hint); flex-shrink: 0; }

    .digest-more-prompt {
      margin: 14px 16px 16px; padding: 14px;
      background: rgba(0,122,255,0.08);
      border: 1px solid rgba(0,122,255,0.2);
      border-radius: 14px;
    }
    .digest-more-q { font-size: 14px; font-weight: 600; color: var(--label); margin-bottom: 10px; }
    .digest-more-actions { display: flex; gap: 8px; }
    .btn-yes {
      flex: 1; background: var(--blue); color: #fff;
      border: none; border-radius: 10px; padding: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: opacity 0.15s;
    }
    .btn-no {
      flex: 1; background: var(--fill3); color: var(--label2);
      border: 0.5px solid var(--sep); border-radius: 10px;
      padding: 10px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    .btn-yes:disabled { opacity: 0.4; cursor: default; }
    .btn-yes:active   { opacity: 0.7; }
    .btn-no:active    { opacity: 0.5; }

    .news-empty {
      text-align: center; padding: 52px 24px;
      color: var(--hint); font-size: 14px; line-height: 1.7;
    }
    .news-empty-icon  { font-size: 52px; margin-bottom: 14px; }
    .news-empty-title { font-size: 20px; font-weight: 700; color: var(--label); margin-bottom: 6px; }

    .btn-primary {
      display: inline-block; background: var(--blue); color: #fff;
      border: none; border-radius: 14px; padding: 13px 28px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 20px; font-family: inherit; transition: opacity 0.15s;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }
    .btn-primary:active   { opacity: 0.7; }

    ::-webkit-scrollbar { width: 0; height: 0; }

    @media (min-width: 600px) {
      #messages   { padding: 16px 20px; }
      .bubble     { max-width: 72%; }
      #input-area { padding: 10px 20px 12px; }
      #news-feed  { padding: 18px 20px 40px; }
    }
  </style>
</head>
<body>

  <div id="transition-overlay"></div>

  <div id="app-window">
    <!-- ══ Toolbar ══ -->
    <div id="window-toolbar">
      <div class="tl-group">
        <span class="tl-dot tl-red"   id="tl-red"></span>
        <span class="tl-dot tl-yellow"></span>
        <span class="tl-dot tl-green"></span>
      </div>
      <div id="toolbar-title">AI Офис</div>
      <button id="toolbar-action" style="visibility:hidden">Очистить</button>
    </div>

    <div id="window-body">
      <!-- Sidebar (desktop) -->
      <div id="window-sidebar">
        <div class="sidebar-section-label">Офис</div>
        <div class="sidebar-item active" data-filter="all" id="sb-all">
          <span class="sidebar-icon">🏢</span> Все агенты
        </div>
        <div class="sidebar-item" data-filter="chat" id="sb-chat">
          <span class="sidebar-icon">💬</span> Чат
        </div>
        <div class="sidebar-item" data-filter="news" id="sb-news">
          <span class="sidebar-icon">📰</span> Новости
        </div>
      </div>

      <div id="window-content">

        <!-- ══ Agents screen ══ -->
        <div id="agents-screen">
          <div class="filter-pills">
            <div class="pill active" data-filter="all">Все</div>
            <div class="pill" data-filter="chat">Чат</div>
            <div class="pill" data-filter="news">Новости</div>
          </div>
          <div id="agents-grid">
            <div class="loading-wrap">
              <div class="spinner"></div>
              <span>Открываем офис…</span>
            </div>
          </div>
        </div>

        <!-- ══ Chat screen ══ -->
        <div id="chat-screen">
          <div class="finder-path-bar">
            <span class="path-root" id="chat-path-root">AI Офис</span>
            <span class="path-sep">›</span>
            <span class="path-current" id="agent-title"></span>
          </div>
          <div id="messages"></div>
          <div id="input-area">
            <textarea id="msg-input" rows="1" placeholder="Сообщение…"></textarea>
            <button id="send-btn">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 13V3M8 3L3.5 7.5M8 3L12.5 7.5"
                      stroke="white" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- ══ News screen ══ -->
        <div id="news-screen">
          <div class="finder-path-bar">
            <span class="path-root" id="news-path-root">AI Офис</span>
            <span class="path-sep">›</span>
            <span class="path-current" id="news-title"></span>
          </div>
          <div id="news-feed"></div>
        </div>

      </div><!-- /window-content -->
    </div><!-- /window-body -->
  </div><!-- /app-window -->

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    /* ════ Theme ════ */
    function applyTheme(s) {
      document.documentElement.dataset.theme = (s === 'light') ? 'light' : 'dark';
    }
    applyTheme(tg.colorScheme || 'dark');
    tg.onEvent('themeChanged', () => applyTheme(tg.colorScheme));

    const BASE = window.location.origin;
    let currentAgent = null;
    const chatHistories = {};

    /* ════ Agent visual config ════ */
    const AGENT_CFG = {
      startup:    { color: '#ff6b35' },
      news:       { color: '#00b4ff' },
      code:       { color: '#30D158' },
      copywriter: { color: '#ff6b9d' },
      analyst:    { color: '#ffb300' },
      translator: { color: '#00e5ff' },
      creative:   { color: '#ff4081' },
      general:    { color: '#007AFF' },
    };
    function cfg(id) { return AGENT_CFG[id] || AGENT_CFG.general; }

    /* ════ Sound system (Web Audio API) ════ */
    let _audioCtx = null;
    function getAudioCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (_audioCtx.state === 'suspended') _audioCtx.resume();
      return _audioCtx;
    }
    function playTone({ freq=440, type='sine', gain=0.12, attack=0.01, decay=0.1, duration=0.15 } = {}) {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const env = ctx.createGain();
        osc.connect(env); env.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        const t = ctx.currentTime;
        env.gain.setValueAtTime(0, t);
        env.gain.linearRampToValueAtTime(gain, t + attack);
        env.gain.linearRampToValueAtTime(0.001, t + attack + decay);
        osc.start(t); osc.stop(t + duration);
      } catch(_) {}
    }
    const SOUNDS = {
      open:    () => { playTone({freq:523,gain:.1,decay:.15}); setTimeout(()=>playTone({freq:659,gain:.08,decay:.2}),60); },
      close:   () => { playTone({freq:440,gain:.07,decay:.12}); setTimeout(()=>playTone({freq:349,gain:.05,decay:.1}),50); },
      send:    () => playTone({freq:1047,type:'triangle',gain:.09,decay:.06,duration:.08}),
      receive: () => playTone({freq:523,type:'triangle',gain:.07,decay:.1,duration:.12}),
      error:   () => playTone({freq:220,type:'sawtooth',gain:.05,decay:.2,duration:.25}),
      refresh: () => [523,659,784].forEach((f,i) => setTimeout(()=>playTone({freq:f,gain:.06,decay:.1}),i*80)),
    };
    const haptic = tg.HapticFeedback;
    function impact(t) { try { haptic.impactOccurred(t); } catch(_) {} }
    function notify(t) { try { haptic.notificationOccurred(t); } catch(_) {} }

    /* ════ Transition overlay ════ */
    function openWithTransition(cardEl, openFn) {
      const r = cardEl.getBoundingClientRect();
      const o = document.getElementById('transition-overlay');
      Object.assign(o.style, {
        left: r.left + 'px', top: r.top + 'px',
        width: r.width + 'px', height: r.height + 'px',
      });
      o.style.setProperty('--sx', (window.innerWidth  / r.width).toFixed(4));
      o.style.setProperty('--sy', (window.innerHeight / r.height).toFixed(4));
      o.classList.remove('collapsing');
      o.classList.add('expanding');
      o.addEventListener('animationend', () => {
        o.classList.remove('expanding');
        openFn();
      }, { once: true });
    }

    function closeWithTransition(closeFn) {
      const o = document.getElementById('transition-overlay');
      closeFn();
      o.classList.remove('expanding');
      o.classList.add('collapsing');
      o.addEventListener('animationend', () => {
        o.classList.remove('collapsing');
      }, { once: true });
    }

    /* ════ Toolbar state ════ */
    function setToolbar(title, actionLabel, actionFn, backFn) {
      document.getElementById('toolbar-title').textContent = title;
      const act = document.getElementById('toolbar-action');
      const red = document.getElementById('tl-red');

      if (actionLabel) {
        act.textContent = actionLabel;
        act.style.visibility = 'visible';
        act.onclick = actionFn;
      } else {
        act.style.visibility = 'hidden';
        act.onclick = null;
      }

      if (backFn) {
        red.classList.add('clickable');
        red.onclick = backFn;
      } else {
        red.classList.remove('clickable');
        red.onclick = null;
      }
    }

    /* ════ Filter ════ */
    let activeFilter = 'all';
    function setFilter(f) {
      activeFilter = f;
      // pills
      document.querySelectorAll('.pill').forEach(p => {
        p.classList.toggle('active', p.dataset.filter === f);
      });
      // sidebar
      document.querySelectorAll('.sidebar-item').forEach(s => {
        s.classList.toggle('active', s.dataset.filter === f);
      });
      // cards
      document.querySelectorAll('.workstation').forEach(card => {
        const t = card.dataset.agentType || 'chat';
        card.style.display = (f === 'all' || f === t) ? '' : 'none';
      });
    }

    document.querySelectorAll('.pill, .sidebar-item').forEach(el => {
      el.addEventListener('click', () => setFilter(el.dataset.filter));
    });

    /* ════ Markdown renderer ════ */
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function applyInline(s) {
      return s
        .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g,    '<strong>$1</strong>')
        .replace(/\*([^*\n]+?)\*/g,   '<em>$1</em>')
        .replace(/`([^`]+)`/g,        '<code class="md-code">$1</code>');
    }
    function renderMarkdown(raw) {
      const lines = esc(String(raw)).split('\n');
      let html = '', inList = false;
      for (const line of lines) {
        if (/^### /.test(line)) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<span class="md-h3">${applyInline(line.slice(4))}</span>`;
        } else if (/^## /.test(line)) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<span class="md-h2">${applyInline(line.slice(3))}</span>`;
        } else if (/^# /.test(line)) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<span class="md-h1">${applyInline(line.slice(2))}</span>`;
        } else if (/^---+$/.test(line.trim())) {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<hr class="md-hr">`;
        } else if (/^[-•*] /.test(line)) {
          if (!inList) { html += '<ul class="md-ul">'; inList = true; }
          html += `<li class="md-li">${applyInline(line.slice(2))}</li>`;
        } else if (line.trim() === '') {
          if (inList) { html += '</ul>'; inList = false; }
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          html += `<span class="md-p">${applyInline(line)}</span>`;
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

    /* ════ Load agents ════ */
    async function loadAgents() {
      try {
        const res = await fetch(`${BASE}/api/agents`);
        if (!res.ok) throw new Error('Ошибка загрузки');
        const agents = await res.json();
        const grid = document.getElementById('agents-grid');
        grid.innerHTML = '';

        if (!agents.length) {
          grid.innerHTML = `<div class="loading-wrap"><span style="font-size:36px">🏗️</span><span>Агенты скоро появятся</span></div>`;
          return;
        }

        agents.forEach(agent => {
          const c = cfg(agent.id);
          const card = document.createElement('div');
          card.className = 'workstation';
          card.dataset.agentType = agent.type || 'chat';
          card.style.setProperty('--accent-color', c.color);
          card.innerHTML = `
            <div class="ws-iso-wrap">
              <div class="ws-iso-stage">
                <!-- Desk -->
                <div class="iso-desk">
                  <div class="f-top"></div>
                  <div class="f-front"></div>
                  <div class="f-right"></div>
                </div>
                <!-- Cabinet -->
                <div class="iso-cabinet">
                  <div class="f-top"></div>
                  <div class="f-front"></div>
                  <div class="f-right"></div>
                  <div class="led"></div>
                </div>
                <!-- Monitor -->
                <div class="iso-monitor">
                  <div class="f-right"></div>
                  <div class="f-top"></div>
                  <div class="f-front">
                    <div class="mon-bar">
                      <span class="mon-dot mon-dot-r"></span>
                      <span class="mon-dot mon-dot-y"></span>
                      <span class="mon-dot mon-dot-g"></span>
                    </div>
                    <div class="mon-screen">
                      <div class="mon-line"></div>
                      <div class="mon-line"></div>
                      <div class="mon-line"></div>
                      <div class="mon-cursor"></div>
                    </div>
                  </div>
                </div>
                <div class="iso-mon-stand"></div>
              </div>
            </div>
            <div class="ws-label">
              <div class="ws-name">${agent.emoji ? agent.emoji + ' ' : ''}${esc(agent.name)}</div>
              <div class="ws-desc">${esc(agent.description)}</div>
              <div class="ws-online"><span class="online-dot"></span> онлайн</div>
            </div>
          `;
          card.addEventListener('click', () => {
            SOUNDS.open(); impact('medium');
            if (agent.type === 'news') openWithTransition(card, () => openNews(agent));
            else openWithTransition(card, () => openChat(agent));
          });
          grid.appendChild(card);
        });

        setFilter(activeFilter);
      } catch (e) {
        document.getElementById('agents-grid').innerHTML =
          `<div class="loading-wrap">⚠️ ${esc(e.message)}</div>`;
      }
    }

    /* ════ Chat ════ */
    function openChat(agent) {
      currentAgent = agent;
      document.getElementById('agents-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('agent-title').textContent = agent.name;
      setToolbar(agent.name, 'Очистить', clearHistory, closeChat);
      renderMessages(agent.id);
      tg.BackButton.show();
      tg.BackButton.onClick(closeChat);
      setTimeout(() => document.getElementById('msg-input').focus(), 100);
    }

    function closeChat() {
      SOUNDS.close(); impact('light');
      closeWithTransition(() => {
        document.getElementById('chat-screen').style.display = 'none';
        document.getElementById('agents-screen').style.display = 'flex';
        setToolbar('AI Офис', null, null, null);
        tg.BackButton.hide();
        tg.BackButton.offClick(closeChat);
        currentAgent = null;
      });
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !currentAgent) return;

      SOUNDS.send(); impact('light');
      const agentId = currentAgent.id;
      input.value = '';
      autoResize(input);

      if (!chatHistories[agentId]) chatHistories[agentId] = [];
      chatHistories[agentId].push({ role: 'user', content: text });
      renderMessages(agentId);

      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(`${BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agent_id: agentId, message: text, telegram_init_data: tg.initData }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка сервера');
        chatHistories[agentId].push({ role: 'assistant', content: data.reply });
        SOUNDS.receive(); notify('success');
      } catch (err) {
        chatHistories[agentId].push({ role: 'assistant', content: `⚠️ ${err.message}` });
        SOUNDS.error(); notify('error');
      } finally {
        sendBtn.disabled = false;
        renderMessages(agentId);
      }
    }

    function renderMessages(agentId) {
      const container = document.getElementById('messages');
      document.getElementById('typing-indicator')?.remove();
      const msgs = chatHistories[agentId] || [];
      container.innerHTML = msgs.map(m =>
        m.role === 'user'
          ? `<div class="message user"><div class="bubble">${esc(m.content)}</div></div>`
          : `<div class="message assistant"><div class="bubble">${renderMarkdown(m.content)}</div></div>`
      ).join('');
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'message assistant';
      el.id = 'typing-indicator';
      el.innerHTML = `<div class="bubble"><div class="typing-dots"><span class="tdot"></span><span class="tdot"></span><span class="tdot"></span></div></div>`;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

    async function clearHistory() {
      if (!currentAgent) return;
      chatHistories[currentAgent.id] = [];
      renderMessages(currentAgent.id);
      try {
        await fetch(`${BASE}/api/chat/${currentAgent.id}/history`, {
          method: 'DELETE',
          headers: { 'X-Telegram-Init-Data': tg.initData },
        });
      } catch (_) {}
    }

    /* ════ News ════ */
    function openNews(agent) {
      currentAgent = agent;
      document.getElementById('agents-screen').style.display = 'none';
      document.getElementById('news-screen').style.display = 'flex';
      document.getElementById('news-title').textContent = agent.name;
      setToolbar(agent.name, 'Обновить', triggerRefresh, closeNews);
      loadNews();
      tg.BackButton.show();
      tg.BackButton.onClick(closeNews);
    }

    function closeNews() {
      SOUNDS.close(); impact('light');
      closeWithTransition(() => {
        document.getElementById('news-screen').style.display = 'none';
        document.getElementById('agents-screen').style.display = 'flex';
        setToolbar('AI Офис', null, null, null);
        tg.BackButton.hide();
        tg.BackButton.offClick(closeNews);
        currentAgent = null;
      });
    }

    async function loadNews() {
      const feed = document.getElementById('news-feed');
      feed.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span>Загрузка дайджестов…</span></div>`;
      try {
        const res = await fetch(`${BASE}/api/news`);
        const digests = await res.json();
        renderDigests(digests);
      } catch (e) {
        feed.innerHTML = `<div class="news-empty"><div class="news-empty-icon">⚠️</div>${esc(e.message)}</div>`;
      }
    }

    function renderDigests(digests) {
      const feed = document.getElementById('news-feed');
      if (!digests || !digests.length) {
        feed.innerHTML = `
          <div class="news-empty">
            <div class="news-empty-icon">📭</div>
            <div class="news-empty-title">Дайджестов пока нет</div>
            Первый выйдет в 8:00, 14:00 или 20:00 МСК.
            <br>
            <button class="btn-primary" id="manual-refresh-btn">⚡ Собрать сейчас</button>
          </div>`;
        document.getElementById('manual-refresh-btn')?.addEventListener('click', triggerRefresh);
        return;
      }
      feed.innerHTML = digests.map((d, i) => buildDigestCard(d, i)).join('');
      feed.querySelectorAll('.digest-expand-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const content = this.closest('.digest-card').querySelector('.digest-content');
          const collapsed = content.classList.contains('truncated');
          content.classList.toggle('truncated');
          this.textContent = collapsed ? 'Свернуть ↑' : 'Читать полностью ↓';
        });
      });
      feed.querySelector('.btn-yes')?.addEventListener('click', () => {
        SOUNDS.refresh(); impact('medium'); triggerRefresh();
      });
      feed.querySelector('.btn-no')?.addEventListener('click', function() {
        this.closest('.digest-more-prompt').style.display = 'none';
      });
    }

    function buildDigestCard(d, i) {
      const isFirst = i === 0;
      const sourcesHtml = (d.links && d.links.length)
        ? `<div class="digest-sources">
            <div class="digest-sources-label">Источники</div>
            ${d.links.map(l => `
              <a class="digest-src-link" href="${esc(l.url)}" target="_blank">
                <div class="digest-src-icon">🔗</div>
                <div class="digest-src-title">${esc(l.title)}</div>
                <svg class="digest-src-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none">
                  <path d="M1 1l5 5-5 5" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </a>`).join('')}
          </div>`
        : '';
      const moreHtml = isFirst
        ? `<div class="digest-more-prompt">
            <div class="digest-more-q">🔄 Хотите ещё свежих новостей?</div>
            <div class="digest-more-actions">
              <button class="btn-yes">Да, собрать!</button>
              <button class="btn-no">Нет, спасибо</button>
            </div>
          </div>`
        : '';
      return `
        <div class="digest-card">
          <div class="digest-header">
            <div class="digest-badge">📰 AI Дайджест</div>
            <div class="digest-title">${esc(d.title)}</div>
            <div class="digest-time">${formatDate(d.created_at)}</div>
          </div>
          <div class="digest-body">
            <div class="digest-content truncated">${renderMarkdown(d.content)}</div>
          </div>
          <button class="digest-expand-btn">Читать полностью ↓</button>
          ${sourcesHtml}
          ${moreHtml}
        </div>`;
    }

    async function triggerRefresh() {
      const feed = document.getElementById('news-feed');
      feed.innerHTML = `<div class="loading-wrap"><div class="spinner"></div><span>Собираю новости… ~30 сек</span></div>`;
      try {
        const res = await fetch(`${BASE}/api/news/refresh`, {
          method: 'POST',
          headers: { 'X-Telegram-Init-Data': tg.initData },
        });
        const ct = res.headers.get('content-type') || '';
        if (!ct.includes('application/json')) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
        renderDigests(data.digests || []);
      } catch (e) {
        feed.innerHTML = `
          <div class="news-empty">
            <div class="news-empty-icon">⚠️</div>
            <div class="news-empty-title">Ошибка сбора</div>
            ${esc(e.message)}<br>
            <button class="btn-primary" onclick="triggerRefresh()">Попробовать снова</button>
          </div>`;
      }
    }

    function formatDate(iso) {
      try {
        return new Date(iso).toLocaleString('ru-RU', {
          day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit',
        });
      } catch { return iso; }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    /* ════ Event listeners ════ */
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msg-input').addEventListener('input', function() { autoResize(this); });

    document.getElementById('chat-path-root').addEventListener('click', closeChat);
    document.getElementById('news-path-root').addEventListener('click', closeNews);

    document.getElementById('messages').addEventListener('touchstart', function(e) {
      if (e.target === this || e.target.closest('.message')) {
        document.getElementById('msg-input').blur();
      }
    }, { passive: true });

    loadAgents();
  </script>
</body>
</html>
