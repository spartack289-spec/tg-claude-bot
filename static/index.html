<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AI Агенты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Agents screen ── */
    #agents-screen { padding: 16px; }

    .screen-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--tg-theme-text-color, #000);
    }

    #agents-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .agent-card {
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      border-radius: 14px;
      padding: 16px 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .agent-card:active { opacity: 0.6; transform: scale(0.97); }

    .agent-emoji { font-size: 34px; line-height: 1; }

    .agent-name {
      font-size: 14px;
      font-weight: 600;
      margin: 10px 0 4px;
      color: var(--tg-theme-text-color, #000);
    }

    .agent-desc {
      font-size: 12px;
      line-height: 1.4;
      color: var(--tg-theme-hint-color, #999);
    }

    /* ── Chat screen ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* ── News screen ── */
    #news-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Shared header ── */
    .screen-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--tg-theme-link-color, #2481cc);
      padding: 0 4px;
      line-height: 1;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
    }

    .header-action-btn {
      background: none;
      border: none;
      font-size: 12px;
      cursor: pointer;
      color: var(--tg-theme-hint-color, #999);
      padding: 4px 8px;
    }

    /* ── Chat ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message { display: flex; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .message.user .bubble {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      color: var(--tg-theme-text-color, #000);
      border-bottom-left-radius: 4px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--tg-theme-hint-color, #999);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
      background: var(--tg-theme-bg-color, #fff);
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    #msg-input {
      flex: 1;
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      color: var(--tg-theme-text-color, #000);
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }

    #msg-input::placeholder { color: var(--tg-theme-hint-color, #999); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── News feed ── */
    #news-feed {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .digest-card {
      background: var(--tg-theme-secondary-bg-color, #f1f1f1);
      border-radius: 14px;
      padding: 16px;
    }

    .digest-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .digest-time {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
      margin-bottom: 12px;
    }

    .digest-content {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .digest-links-toggle {
      margin-top: 12px;
      background: none;
      border: none;
      color: var(--tg-theme-link-color, #2481cc);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
    }

    .digest-links {
      display: none;
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .digest-links.hidden { display: none; }

    .digest-link {
      font-size: 12px;
      color: var(--tg-theme-link-color, #2481cc);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .news-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--tg-theme-hint-color, #999);
      font-size: 14px;
      line-height: 1.6;
    }

    .refresh-btn {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 20px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 12px;
    }

    .refresh-btn:disabled { opacity: 0.5; cursor: default; }

    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 120px;
      color: var(--tg-theme-hint-color, #999);
      font-size: 14px;
    }

    .spinning { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Agents list screen -->
  <div id="agents-screen">
    <p class="screen-title">AI Агенты</p>
    <div id="agents-grid">
      <div id="loading">Загрузка...</div>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen">
    <div class="screen-header">
      <button class="back-btn" id="chat-back-btn" aria-label="Назад">‹</button>
      <span class="header-title" id="agent-title"></span>
      <button class="header-action-btn" id="clear-btn">Очистить</button>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="msg-input" rows="1" placeholder="Сообщение..."></textarea>
      <button id="send-btn" aria-label="Отправить">➤</button>
    </div>
  </div>

  <!-- News feed screen -->
  <div id="news-screen">
    <div class="screen-header">
      <button class="back-btn" id="news-back-btn" aria-label="Назад">‹</button>
      <span class="header-title" id="news-title"></span>
      <button class="header-action-btn" id="news-refresh-btn">↻</button>
    </div>
    <div id="news-feed"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const BASE_URL = window.location.origin;
    let currentAgent = null;
    const chatHistories = {};

    // ── Load agents ──────────────────────────────────────────────
    async function loadAgents() {
      try {
        const res = await fetch(`${BASE_URL}/api/agents`);
        if (!res.ok) throw new Error('Ошибка загрузки');
        const agents = await res.json();
        const grid = document.getElementById('agents-grid');
        grid.innerHTML = '';
        if (agents.length === 0) {
          grid.innerHTML = '<div id="loading">Агенты ещё не добавлены</div>';
          return;
        }
        agents.forEach(agent => {
          const card = document.createElement('div');
          card.className = 'agent-card';
          card.innerHTML = `
            <div class="agent-emoji">${agent.emoji}</div>
            <div class="agent-name">${escHtml(agent.name)}</div>
            <div class="agent-desc">${escHtml(agent.description)}</div>
          `;
          card.addEventListener('click', () => {
            if (agent.type === 'news') {
              openNews(agent);
            } else {
              openChat(agent);
            }
          });
          grid.appendChild(card);
        });
      } catch (e) {
        document.getElementById('agents-grid').innerHTML =
          `<div id="loading">Ошибка: ${escHtml(e.message)}</div>`;
      }
    }

    // ── Chat navigation ──────────────────────────────────────────
    function openChat(agent) {
      currentAgent = agent;
      document.getElementById('agents-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('agent-title').textContent = `${agent.emoji} ${agent.name}`;
      renderMessages(agent.id);
      tg.BackButton.show();
      tg.BackButton.onClick(closeChat);
      document.getElementById('msg-input').focus();
    }

    function closeChat() {
      document.getElementById('chat-screen').style.display = 'none';
      document.getElementById('agents-screen').style.display = 'block';
      tg.BackButton.hide();
      tg.BackButton.offClick(closeChat);
      currentAgent = null;
    }

    // ── News navigation ──────────────────────────────────────────
    function openNews(agent) {
      currentAgent = agent;
      document.getElementById('agents-screen').style.display = 'none';
      document.getElementById('news-screen').style.display = 'flex';
      document.getElementById('news-title').textContent = `${agent.emoji} ${agent.name}`;
      loadNews();
      tg.BackButton.show();
      tg.BackButton.onClick(closeNews);
    }

    function closeNews() {
      document.getElementById('news-screen').style.display = 'none';
      document.getElementById('agents-screen').style.display = 'block';
      tg.BackButton.hide();
      tg.BackButton.offClick(closeNews);
      currentAgent = null;
    }

    async function loadNews() {
      const feed = document.getElementById('news-feed');
      feed.innerHTML = '<div id="loading">Загрузка дайджестов...</div>';
      try {
        const res = await fetch(`${BASE_URL}/api/news`);
        const digests = await res.json();
        renderDigests(digests);
      } catch (e) {
        feed.innerHTML = `<div class="news-empty">Ошибка загрузки: ${escHtml(e.message)}</div>`;
      }
    }

    function renderDigests(digests) {
      const feed = document.getElementById('news-feed');
      if (!digests || digests.length === 0) {
        feed.innerHTML = `
          <div class="news-empty">
            Дайджестов пока нет.<br>
            Первый выйдет в 8:00, 14:00 или 20:00 МСК.<br><br>
            <button class="refresh-btn" id="manual-refresh-btn">Собрать сейчас</button>
          </div>`;
        document.getElementById('manual-refresh-btn')?.addEventListener('click', triggerRefresh);
        return;
      }

      feed.innerHTML = digests.map((d, i) => `
        <div class="digest-card">
          <div class="digest-title">${escHtml(d.title)}</div>
          <div class="digest-time">${formatDate(d.created_at)}</div>
          <div class="digest-content">${escHtml(d.content)}</div>
          ${d.links && d.links.length > 0 ? `
            <button class="digest-links-toggle" onclick="toggleLinks(${i})">
              Источники (${d.links.length}) ↗
            </button>
            <div class="digest-links hidden" id="links-${i}">
              ${d.links.map(l => `<a class="digest-link" href="${escHtml(l.url)}" target="_blank">${escHtml(l.title)}</a>`).join('')}
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function toggleLinks(i) {
      const el = document.getElementById(`links-${i}`);
      if (el) el.classList.toggle('hidden');
    }

    async function triggerRefresh() {
      const btn = document.getElementById('news-refresh-btn') || document.getElementById('manual-refresh-btn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
      try {
        await fetch(`${BASE_URL}/api/news/refresh`, {
          method: 'POST',
          headers: { 'X-Telegram-Init-Data': tg.initData },
        });
        await loadNews();
      } catch (e) {
        alert('Ошибка: ' + e.message);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '↻'; }
      }
    }

    document.getElementById('news-refresh-btn').addEventListener('click', triggerRefresh);

    function formatDate(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('ru-RU', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
      } catch { return iso; }
    }

    // ── Chat send ────────────────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !currentAgent) return;

      const agentId = currentAgent.id;
      input.value = '';
      autoResize(input);

      if (!chatHistories[agentId]) chatHistories[agentId] = [];
      chatHistories[agentId].push({ role: 'user', content: text });
      renderMessages(agentId);

      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(`${BASE_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            agent_id: agentId,
            message: text,
            telegram_init_data: tg.initData,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Ошибка сервера');
        chatHistories[agentId].push({ role: 'assistant', content: data.reply });
      } catch (err) {
        chatHistories[agentId].push({ role: 'assistant', content: `⚠️ ${err.message}` });
      } finally {
        sendBtn.disabled = false;
        renderMessages(agentId);
      }
    }

    function renderMessages(agentId) {
      const container = document.getElementById('messages');
      const msgs = chatHistories[agentId] || [];
      container.innerHTML = msgs.map(m => `
        <div class="message ${m.role}">
          <div class="bubble">${escHtml(m.content)}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('messages');
      const el = document.createElement('div');
      el.className = 'message assistant';
      el.id = 'typing-indicator';
      el.innerHTML = `<div class="bubble" style="display:flex;gap:4px;align-items:center;padding:12px 16px">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>`;
      container.appendChild(el);
      container.scrollTop = container.scrollHeight;
    }

    async function clearHistory() {
      if (!currentAgent) return;
      const agentId = currentAgent.id;
      chatHistories[agentId] = [];
      renderMessages(agentId);
      try {
        await fetch(`${BASE_URL}/api/chat/${agentId}/history`, {
          method: 'DELETE',
          headers: { 'X-Telegram-Init-Data': tg.initData },
        });
      } catch (_) {}
    }

    // ── Helpers ──────────────────────────────────────────────────
    function escHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Event listeners ──────────────────────────────────────────
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('msg-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msg-input').addEventListener('input', function () { autoResize(this); });
    document.getElementById('chat-back-btn').addEventListener('click', closeChat);
    document.getElementById('news-back-btn').addEventListener('click', closeNews);
    document.getElementById('clear-btn').addEventListener('click', clearHistory);

    // ── Init ─────────────────────────────────────────────────────
    loadAgents();
  </script>
</body>
</html>
